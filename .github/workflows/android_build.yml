name: Android CD

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g. 1.2). Leave empty to keep current.'
        required: false
        type: string
      build_type:
        description: 'Build Type'
        required: true
        type: choice
        options:
          - apk
          - aab
        default: aab
      upload_to_play:
        description: 'Upload to Google Play Console'
        required: false
        type: boolean
        default: false
      track:
        description: 'Google Play Track'
        required: true
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Bump version
        id: bump_version
        run: |
          GRADLE_FILE="composeApp/build.gradle.kts"

          # Auto-increase the build version (versionCode) by 2 from the value
          # committed in the gradle file. It is committed back on success, so it
          # stays strictly increasing from the starting point set in the repo.
          CURRENT_CODE=$(grep -oP 'versionCode\s*=\s*\K[0-9]+' "$GRADLE_FILE" | head -n1)
          NEW_CODE=$((CURRENT_CODE + 2))
          sed -i "s/versionCode\s*=\s*$CURRENT_CODE/versionCode = $NEW_CODE/" "$GRADLE_FILE"
          echo "Bumped versionCode: $CURRENT_CODE -> $NEW_CODE"

          # Update versionName when provided as input
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -n "$VERSION_NAME" ]; then
            sed -i "s/versionName\s*=\s*\".*\"/versionName = \"$VERSION_NAME\"/" "$GRADLE_FILE"
            echo "Updated versionName to: $VERSION_NAME"
          else
            VERSION_NAME=$(grep -oP 'versionName\s*=\s*"\K[^"]+' "$GRADLE_FILE" | head -n1)
            echo "Kept existing versionName: $VERSION_NAME"
          fi

          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" > composeApp/google-services.json

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build APK with Gradle
        if: ${{ github.event.inputs.build_type == 'apk' }}
        run: ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_FILE: ../release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build AAB with Gradle
        if: ${{ github.event.inputs.build_type == 'aab' }}
        run: ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_FILE: ../release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK Artifact
        if: ${{ github.event.inputs.build_type == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: composeApp/build/outputs/apk/release/*.apk

      - name: Upload AAB Artifact
        if: ${{ github.event.inputs.build_type == 'aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: composeApp/build/outputs/bundle/release/*.aab

      - name: Upload to Google Play
        if: ${{ github.event.inputs.upload_to_play == 'true' && github.event.inputs.build_type == 'aab' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: tools.mo3ta.kam
          releaseFiles: composeApp/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track }}
          status: completed

      - name: Commit version bump
        if: ${{ success() }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add composeApp/build.gradle.kts
          if git diff --cached --quiet; then
            echo "No version changes to commit."
          else
            git commit -m "ci: bump version to ${{ steps.bump_version.outputs.version_name }} (${{ steps.bump_version.outputs.version_code }})"
            git push
          fi
