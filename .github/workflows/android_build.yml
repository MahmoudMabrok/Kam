name: Android CD

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        type: choice
        options:
          - apk
          - aab
        default: apk
      upload_to_play:
        description: 'Upload to Google Play Console'
        required: false
        type: boolean
        default: false
      track:
        description: 'Google Play Track'
        required: true
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build APK with Gradle
        if: ${{ github.event.inputs.build_type == 'apk' }}
        run: ./gradlew assembleRelease
        env:
          ANDROID_KEYSTORE_FILE: ../release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build AAB with Gradle
        if: ${{ github.event.inputs.build_type == 'aab' }}
        run: ./gradlew bundleRelease
        env:
          ANDROID_KEYSTORE_FILE: ../release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK Artifact
        if: ${{ github.event.inputs.build_type == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: composeApp/build/outputs/apk/release/*.apk

      - name: Upload AAB Artifact
        if: ${{ github.event.inputs.build_type == 'aab' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: composeApp/build/outputs/bundle/release/*.aab

      - name: Upload to Google Play
        if: ${{ github.event.inputs.upload_to_play == 'true' && github.event.inputs.build_type == 'aab' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: tools.mo3ta.kam
          releaseFiles: composeApp/build/outputs/bundle/release/*.aab
          track: ${{ github.event.inputs.track }}
          status: completed
