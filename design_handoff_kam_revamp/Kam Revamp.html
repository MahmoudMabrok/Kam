<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kam — Revamp</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Archivo:wght@400;500;600;700&family=Spectral:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --paper:#F4F0E6; --paper-2:#ECE7DA; --card:#FCFAF5; --card-2:#F3EEE2;
  --ink:#1A1815; --ink-2:#6E695D; --ink-3:#A8A192;
  --line:rgba(26,24,21,0.10); --line-2:rgba(26,24,21,0.06);
  --green:oklch(0.57 0.11 155); --green-soft:oklch(0.57 0.11 155 / 0.12);
  --terra:oklch(0.6 0.14 40); --terra-soft:oklch(0.6 0.14 40 / 0.12);
  --tier-0:oklch(0.6 0.035 80); --tier-1:oklch(0.62 0.09 130);
  --tier-2:oklch(0.57 0.11 155); --tier-3:oklch(0.7 0.12 85);
  --font-d:'Space Grotesk',system-ui,sans-serif;
  --font-b:'Hanken Grotesk',system-ui,sans-serif;
  --r:22px;
}
*{ box-sizing:border-box; }
html,body{ margin:0; height:100%; }
body{
  background:#DBD6CB; font-family:var(--font-b); color:var(--ink);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
.stage{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:28px; }
.tnum{ font-variant-numeric:tabular-nums; }
button{ font-family:inherit; color:inherit; cursor:pointer; border:none; background:none; }

/* ---- root + slider ---- */
.app-root{ position:relative; height:100%; width:100%; overflow:hidden; background:var(--paper); }
.slider{ display:flex; width:200%; height:100%; transition:transform .42s cubic-bezier(.7,0,.2,1); }
.slider.screen-result{ transform:translateX(-50%); }
.panel{ width:50%; height:100%; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; }
.panel::-webkit-scrollbar{ display:none; }
.screen{ min-height:100%; padding:0 20px 46px; }

/* ---- top bar ---- */
.top{ display:flex; align-items:center; justify-content:space-between; padding-top:60px; padding-bottom:6px; }
.wordmark{ display:flex; align-items:center; gap:8px; font-family:var(--font-d); font-weight:700; font-size:23px; letter-spacing:-0.5px; }
.wm-dot{ width:12px; height:12px; border-radius:50%; background:var(--green); box-shadow:0 0 0 4px var(--green-soft); }
.icon-btn{ width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--ink-2); background:var(--card); box-shadow:0 1px 2px rgba(0,0,0,.05); }
.icon-btn.back{ background:var(--card); }

/* ---- hero ---- */
.hero{ font-family:var(--font-d); font-weight:600; font-size:33px; line-height:1.08; letter-spacing:-1px; margin:18px 0 0; text-wrap:balance; }
.hero em{ font-style:normal; color:var(--green); }
.hero-sub{ color:var(--ink-2); font-size:15.5px; line-height:1.45; margin:11px 0 0; max-width:31ch; }

/* ---- compare card ---- */
.compare-card{ background:var(--card); border-radius:26px; padding:7px 7px 0; margin-top:22px; box-shadow:0 1px 2px rgba(0,0,0,.04),0 14px 40px -16px rgba(26,24,21,.22); position:relative; }
.cc-row{ padding:0; }
.city-sel{ width:100%; text-align:left; padding:15px 16px; border-radius:20px; display:block; transition:background .15s; }
.city-sel:active{ background:var(--card-2); }
.city-sel-label{ font-size:11px; font-weight:600; letter-spacing:1.4px; color:var(--ink-3); }
.city-sel-main{ display:flex; align-items:center; gap:13px; margin-top:9px; }
.city-sel-text{ flex:1; min-width:0; }
.city-sel-name{ font-family:var(--font-d); font-weight:600; font-size:21px; letter-spacing:-0.4px; }
.city-sel-country{ font-size:13px; color:var(--ink-2); margin-top:1px; }
.city-sel-chev{ color:var(--ink-3); flex-shrink:0; }

.region-chip{ flex-shrink:0; border-radius:9px; background:var(--card-2); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-family:var(--font-d); font-weight:600; letter-spacing:0.5px; color:var(--ink-2); }

/* salary field */
.salary-field{ width:calc(100% - 14px); margin:2px 7px 4px; text-align:left; background:linear-gradient(180deg,var(--ink) 0%,#26231e 100%); color:#F4F0E6; border-radius:18px; padding:15px 17px; position:relative; }
.sf-label{ font-size:11px; font-weight:600; letter-spacing:1.2px; color:rgba(244,240,230,.55); }
.sf-value{ display:flex; align-items:baseline; gap:8px; margin-top:6px; }
.sf-amount{ font-family:var(--font-d); font-weight:600; font-size:30px; letter-spacing:-0.6px; font-variant-numeric:tabular-nums; }
.sf-cur{ font-size:13px; color:rgba(244,240,230,.6); font-weight:500; }
.sf-edit{ position:absolute; top:15px; right:16px; font-size:12.5px; font-weight:600; color:var(--green); background:var(--green-soft); padding:5px 11px; border-radius:20px; }

/* divider + swap */
.cc-divider{ height:1px; background:var(--line); margin:6px 16px; position:relative; }
.swap-btn{ position:absolute; right:6px; top:50%; transform:translateY(-50%); width:42px; height:42px; border-radius:13px; background:var(--card); border:1px solid var(--line); color:var(--ink); display:flex; align-items:center; justify-content:center; box-shadow:0 2px 6px rgba(0,0,0,.08); transition:transform .2s; z-index:2; }
.swap-btn:active{ transform:translateY(-50%) rotate(180deg); }

/* live strip */
.live-strip{ display:flex; align-items:center; gap:9px; margin:7px; padding:13px 16px; border-radius:18px; font-size:15px; }
.live-strip.down{ background:var(--green-soft); color:var(--green); }
.live-strip.up{ background:var(--terra-soft); color:var(--terra); }
.ls-arrow{ font-size:18px; font-weight:700; line-height:1; }
.ls-text{ color:var(--ink-2); }
.live-strip.down .ls-text strong{ color:var(--green); }
.live-strip.up .ls-text strong{ color:var(--terra); }
.ls-text strong{ font-weight:700; }

/* CTA */
.cta{ width:100%; margin-top:18px; background:var(--ink); color:var(--paper); border-radius:18px; padding:18px; font-family:var(--font-d); font-weight:600; font-size:16.5px; letter-spacing:-0.2px; display:flex; align-items:center; justify-content:center; gap:9px; box-shadow:0 8px 22px -8px rgba(26,24,21,.5); transition:transform .12s; }
.cta:active{ transform:scale(.98); }

/* offer */
.offer-add{ display:block; width:calc(100% - 14px); margin:2px 7px 4px; padding:14px; border-radius:16px; border:1.5px dashed var(--line); color:var(--ink-2); font-size:14px; font-weight:600; text-align:center; }
.offer-add:active{ background:var(--card-2); }
.offer-field{ display:flex; align-items:center; gap:8px; margin:2px 7px 4px; }
.of-main{ flex:1; text-align:left; background:var(--card-2); border:1px solid var(--line); border-radius:16px; padding:12px 16px; }
.of-label{ color:var(--ink-3); }
.of-value{ font-family:var(--font-d); font-weight:600; font-size:24px; letter-spacing:-0.5px; margin-top:5px; font-variant-numeric:tabular-nums; display:flex; align-items:baseline; gap:7px; }
.of-cur{ font-size:12.5px; color:var(--ink-2); font-weight:500; font-family:var(--font-b); letter-spacing:0; }
.of-clear{ width:34px; height:34px; border-radius:50%; background:var(--card-2); border:1px solid var(--line); color:var(--ink-2); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.oc-amount{ font-family:var(--font-d); font-weight:600; font-size:36px; letter-spacing:-1px; margin-top:12px; line-height:1; font-variant-numeric:tabular-nums; }
.oc-amount span{ font-size:15px; color:var(--ink-3); letter-spacing:0; margin-left:2px; }
.oc-desc{ font-size:13.5px; color:var(--ink-2); line-height:1.55; margin-top:10px; }
.oc-desc strong{ color:var(--ink); font-weight:600; }
.tier-marker.ghost{ background:transparent; border:2.5px solid var(--ink-2); box-shadow:none; width:13px; height:13px; top:5px; }
.lg-ghost{ background:transparent; border:2px solid var(--ink-2); border-radius:50%; width:6px; height:6px; }
.lg-solid{ background:var(--ink); border-radius:50%; width:9px; height:9px; }

/* ---- result screen ---- */
.result-top{ gap:12px; justify-content:flex-start; }
.route-mini{ display:flex; align-items:center; gap:7px; font-family:var(--font-d); font-weight:600; font-size:14.5px; letter-spacing:-0.2px; color:var(--ink); }
.rm-arrow{ color:var(--ink-3); margin:0 1px; }

.verdict{ font-family:var(--font-d); font-weight:600; font-size:27px; line-height:1.18; letter-spacing:-0.7px; margin:18px 2px 0; text-wrap:balance; }
.verdict em{ font-style:normal; }
.up{ color:var(--terra); } .down{ color:var(--green); }

.card{ background:var(--card); border-radius:var(--r); padding:18px; margin-top:14px; box-shadow:0 1px 2px rgba(0,0,0,.035); }
.card-head{ display:flex; align-items:center; justify-content:space-between; font-size:11px; font-weight:600; letter-spacing:1.3px; color:var(--ink-3); text-transform:uppercase; }
.card-badge{ font-size:11px; font-weight:700; padding:4px 9px; border-radius:20px; text-transform:none; letter-spacing:0; }
.card-badge.up{ background:var(--terra-soft); color:var(--terra); }
.card-badge.down{ background:var(--green-soft); color:var(--green); }

/* hero result card */
.hero-card{ background:linear-gradient(165deg,#211E19 0%,#14120F 100%); color:var(--paper); padding:22px; box-shadow:0 18px 40px -18px rgba(26,24,21,.55); }
.hc-tag{ font-size:11px; font-weight:600; letter-spacing:1.6px; color:rgba(244,240,230,.5); }
.hc-amount{ font-family:var(--font-d); font-weight:600; font-size:46px; letter-spacing:-1.5px; margin-top:8px; line-height:1; font-variant-numeric:tabular-nums; }
.hc-amount .hc-per{ font-size:18px; color:rgba(244,240,230,.55); letter-spacing:0; margin-left:3px; }
.hc-desc{ font-size:14px; line-height:1.5; color:rgba(244,240,230,.78); margin-top:12px; }
.hc-desc strong{ color:#fff; font-weight:600; }
.hc-foot{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:18px; padding-top:16px; border-top:1px solid rgba(244,240,230,.14); }
.hcf-k{ font-size:11.5px; color:rgba(244,240,230,.5); font-weight:500; }
.hcf-v{ font-family:var(--font-d); font-weight:600; font-size:19px; margin-top:3px; font-variant-numeric:tabular-nums; }
.hcf-v span{ font-size:12px; color:rgba(244,240,230,.5); margin-left:2px; }
.hcf-pill{ font-size:13px; font-weight:700; padding:8px 13px; border-radius:13px; white-space:nowrap; }
.hcf-pill.up{ background:rgba(217,122,80,.22); color:#F0A985; }
.hcf-pill.down{ background:rgba(120,180,120,.2); color:#8FD49B; }

/* power */
.power-headline{ font-family:var(--font-d); font-size:18px; font-weight:500; margin:14px 0 16px; letter-spacing:-0.3px; }
.power-headline strong{ font-weight:700; }
.powerbar-track{ position:relative; height:14px; background:var(--card-2); border-radius:8px; overflow:hidden; }
.powerbar-fill{ position:absolute; top:0; bottom:0; border-radius:8px; transition:all .4s cubic-bezier(.7,0,.2,1); }
.powerbar-zero{ position:absolute; top:-3px; bottom:-3px; width:2px; background:var(--ink); border-radius:2px; transform:translateX(-1px); }
.powerbar-labels{ display:flex; justify-content:space-between; margin-top:9px; font-size:11.5px; color:var(--ink-3); font-weight:500; }
.powerbar-labels span:nth-child(2){ position:relative; }

/* tier */
.tier-head{ margin:13px 0 16px; }
.tier-name{ font-family:var(--font-d); font-weight:700; font-size:24px; letter-spacing:-0.5px; }
.tier-blurb{ display:block; font-size:13.5px; color:var(--ink-2); line-height:1.45; margin-top:5px; }
.tiermeter-track{ display:flex; gap:4px; position:relative; padding-top:9px; }
.tier-seg{ flex:1; height:7px; border-radius:5px; background:var(--card-2); position:relative; display:flex; }
.tier-seg span{ position:absolute; top:11px; left:0; font-size:10.5px; font-weight:600; color:var(--ink-3); letter-spacing:0.2px; white-space:nowrap; }
.tier-seg.active{ background:var(--tc); }
.tier-seg.active span{ color:var(--tc); }
.tier-marker{ position:absolute; top:4px; width:15px; height:15px; border-radius:50%; background:var(--ink); border:3px solid var(--card); transform:translateX(-50%); transition:left .4s cubic-bezier(.7,0,.2,1); box-shadow:0 1px 4px rgba(0,0,0,.25); }

/* breakdown */
.breakdown{ margin-top:14px; display:flex; flex-direction:column; gap:13px; }
.bd-row{ display:grid; grid-template-columns:74px 1fr 46px; align-items:center; gap:10px; }
.bd-label{ font-size:13px; color:var(--ink-2); font-weight:500; }
.bd-bars{ display:flex; flex-direction:column; gap:4px; }
.bd-bar{ height:7px; border-radius:5px; transition:width .5s cubic-bezier(.7,0,.2,1); }
.bd-origin{ background:var(--ink-3); opacity:.55; }
.bd-diff{ font-family:var(--font-d); font-weight:600; font-size:13px; text-align:right; font-variant-numeric:tabular-nums; }
.bd-diff.down{ color:var(--green); } .bd-diff.up{ color:var(--terra); }
.legend{ display:flex; align-items:center; gap:5px; font-size:11px; letter-spacing:0; text-transform:none; font-weight:600; color:var(--ink-3); }
.legend i{ width:9px; height:9px; border-radius:3px; display:inline-block; margin-left:6px; }
.lg-o{ background:var(--ink-3); opacity:.55; } .lg-d{ background:var(--green); }

.foot-note{ font-size:11.5px; color:var(--ink-3); line-height:1.5; margin:18px 4px 0; }

/* ---- sheets ---- */
.sheet-wrap{ position:absolute; inset:0; z-index:80; pointer-events:none; }
.sheet-wrap.open{ pointer-events:auto; }
.sheet-scrim{ position:absolute; inset:0; background:rgba(20,18,15,.42); opacity:0; transition:opacity .32s; }
.sheet-wrap.open .sheet-scrim{ opacity:1; }
.sheet{ position:absolute; left:0; right:0; bottom:0; background:var(--paper); border-radius:30px 30px 0 0; padding:10px 18px 30px; transform:translateY(101%); transition:transform .4s cubic-bezier(.6,0,.2,1); max-height:88%; display:flex; flex-direction:column; box-shadow:0 -10px 40px rgba(20,18,15,.2); }
.sheet-wrap.open .sheet{ transform:translateY(0); }
.sheet-grip{ width:38px; height:5px; border-radius:5px; background:var(--ink-3); opacity:.4; margin:4px auto 12px; }
.sheet-title{ font-family:var(--font-d); font-weight:600; font-size:20px; letter-spacing:-0.4px; padding:0 2px 12px; }

/* search */
.search{ display:flex; align-items:center; gap:9px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px 14px; color:var(--ink-3); }
.search input{ border:none; background:none; outline:none; font-family:var(--font-b); font-size:15.5px; color:var(--ink); width:100%; }
.search input::placeholder{ color:var(--ink-3); }
.city-list{ margin-top:10px; overflow-y:auto; flex:1; }
.city-list::-webkit-scrollbar{ display:none; }
.city-list-row{ width:100%; display:flex; align-items:center; gap:13px; padding:11px 8px; border-radius:14px; text-align:left; }
.city-list-row:active{ background:var(--card-2); }
.city-list-row.sel{ background:var(--card); }
.clr-text{ flex:1; min-width:0; }
.clr-name{ font-family:var(--font-d); font-weight:600; font-size:16.5px; letter-spacing:-0.3px; }
.clr-country{ font-size:12.5px; color:var(--ink-2); margin-top:1px; }
.clr-index{ font-family:var(--font-d); font-weight:600; font-size:13px; color:var(--ink-3); background:var(--card-2); padding:4px 9px; border-radius:9px; font-variant-numeric:tabular-nums; }
.clr-check{ color:var(--green); margin-left:2px; }
.city-empty{ text-align:center; color:var(--ink-3); padding:30px; font-size:14px; }

/* keypad */
.kp-display{ display:flex; align-items:baseline; justify-content:center; gap:6px; padding:14px 0 20px; }
.kp-sym{ font-family:var(--font-d); font-weight:500; font-size:26px; color:var(--ink-2); }
.kp-num{ font-family:var(--font-d); font-weight:600; font-size:48px; letter-spacing:-1.5px; font-variant-numeric:tabular-nums; min-height:48px; }
.kp-cur{ font-size:14px; color:var(--ink-3); font-weight:600; align-self:center; }
.keypad{ display:grid; grid-template-columns:repeat(3,1fr); gap:9px; }
.kp-key{ height:58px; border-radius:16px; background:var(--card); font-family:var(--font-d); font-weight:600; font-size:24px; color:var(--ink); display:flex; align-items:center; justify-content:center; box-shadow:0 1px 2px rgba(0,0,0,.05); transition:background .12s,transform .08s; }
.kp-key:active{ background:var(--card-2); transform:scale(.96); }
.kp-del{ color:var(--ink-2); }
.kp-done{ width:100%; margin-top:14px; background:var(--ink); color:var(--paper); border-radius:16px; padding:16px; font-family:var(--font-d); font-weight:600; font-size:16px; }
.kp-done:active{ transform:scale(.98); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="data.js"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
